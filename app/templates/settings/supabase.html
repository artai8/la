{% extends "base.html" %}
{% block title %}Supabase 配置{% endblock %}
{% block page_title %}Supabase 远程数据库配置{% endblock %}

{% block content %}
<div class="max-w-2xl">
    {% if message %}
    <div class="mb-4 p-3 rounded-lg
        {% if msg_type == 'success' %}bg-green-900/50 border border-green-700 text-green-300
        {% elif msg_type == 'warning' %}bg-yellow-900/50 border border-yellow-700 text-yellow-300
        {% else %}bg-red-900/50 border border-red-700 text-red-300{% endif %}">
        {{ message }}
    </div>
    {% endif %}

    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <h3 class="text-lg font-semibold mb-4">Supabase 配置</h3>
        <p class="text-sm text-gray-400 mb-6">配置 Supabase 远程数据库，用于存储 session、群成员和聊天内容的远程备份。</p>

        <form method="POST" action="/settings/supabase" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Project URL</label>
                <input type="url" name="supabase_url" value="{{ supabase_url }}"
                       placeholder="https://xxxx.supabase.co"
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Publishable Key (anon key)</label>
                <input type="text" name="supabase_key" value="{{ supabase_key }}"
                       placeholder="eyJhbGci..."
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                保存并测试连接
            </button>
        </form>
    </div>
</div>
{% endblock %}
