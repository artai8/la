version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: telegram
      POSTGRES_PASSWORD: telegram_secret
      POSTGRES_DB: telegram_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram -d telegram_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://telegram:telegram_secret@db:5432/telegram_manager
      SECRET_KEY: change-this-to-a-random-secret-key
      PORT: "8000"
      XRAY_BIN_PATH: /usr/local/bin/xray
      XRAY_CONFIG_DIR: /app/xray_configs
      LOG_DIR: /app/logs
    volumes:
      - app-logs:/app/logs
      - xray-configs:/app/xray_configs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  pgdata:
  app-logs:
  xray-configs:
